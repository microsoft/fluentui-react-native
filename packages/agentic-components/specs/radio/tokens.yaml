component: Radio
type: molecular

variants:
  State:
    values: [Rest, Hover, Pressed, Disabled, Focus]
  Status:
    values: [Unselected, Selected]
    default: Unselected

tokens:
  background:
    rest:
      Unselected: colorBackgroundNeutralTransparent
      Selected: colorBackgroundNeutralTransparent
    disabled:
      Unselected: colorBackgroundNeutralTransparent
      Selected: colorBackgroundNeutralTransparent

  foreground:
    indicator:
      rest:
        Selected:
          value: colorForegroundBrandPrimary
          hover: hover.colorForegroundBrandPrimary
          pressed: pressed.colorForegroundBrandPrimary
        Unselected: n/a — no indicator dot visible.
      disabled:
        Selected: colorForegroundNeutralDisabled
    label:
      rationale: >
        Radio-level override applied to the composed flex-components:label
        sub-component. Label's own state model is Rest/Disabled only — the
        secondary→primary shift across Status (Unselected/Selected) is
        Radio-owned because it communicates the active choice within a group.
        Label remains the source of truth for the label's typography and
        <label for> association behavior.
      rest:
        Unselected:
          value: colorForegroundNeutralSecondary
          hover: hover.colorForegroundNeutralSecondary
          pressed: pressed.colorForegroundNeutralSecondary
        Selected:
          value: colorForegroundNeutralPrimary
          hover: hover.colorForegroundNeutralPrimary
          pressed: pressed.colorForegroundNeutralPrimary
      disabled:
        Unselected: colorForegroundNeutralDisabled
        Selected: colorForegroundNeutralDisabled
    secondary-text:
      rationale: Stays at secondary regardless of Status — does not promote on Selected.
      rest:
        Unselected:
          value: colorForegroundNeutralSecondary
          hover: hover.colorForegroundNeutralSecondary
          pressed: pressed.colorForegroundNeutralSecondary
        Selected:
          value: colorForegroundNeutralSecondary
          hover: hover.colorForegroundNeutralSecondary
          pressed: pressed.colorForegroundNeutralSecondary
      disabled:
        Unselected: colorForegroundNeutralDisabled
        Selected: colorForegroundNeutralDisabled

  stroke:
    width: strokeWidthThin
    width-rationale: Standard containment stroke for form controls; consistent with other atomic input components.
    rest:
      Unselected:
        value: colorStrokeNeutralHeavy
        hover: hover.colorStrokeNeutralHeavy
        pressed: pressed.colorStrokeNeutralHeavy
      Selected:
        value: colorStrokeBrandLoud
        hover: hover.colorStrokeBrandLoud
        pressed: pressed.colorStrokeBrandLoud
    focus: See flex-system:styling — universal dual-outline focus ring.
    disabled:
      Unselected: colorStrokeNeutralDisabled
      Selected: colorStrokeNeutralDisabled

  radius:
    indicator: borderRadiusCircular
    focus-ring: borderRadiusBase300
    focus-ring-rationale: >
      Focus ring wraps the entire interactive area (indicator + label),
      so it uses a larger radius than the indicator itself.

  typography:
    label:
      source: flex-components:label
      rationale: >
        Typography is sourced from the composed Label sub-component
        (Weight=Regular × Size=Medium → textstyle-functional-body-medium).
        Radio does not bind typography directly so there is a single
        source of truth for the label's text style.
    secondary-text:
      token: textstyle-functional-body-small
      font-family: fontFamilyFunctional
      rationale: One step smaller than body-medium to create clear hierarchy between primary label and description.

  spacing:
    indicator:
      margin: spacingComponentBase200
      margin-rationale: >
        Margin on the visible indicator provides visual breathing room
        without introducing an extra DOM/Figma wrapper layer. The Radio's
        hit target is the Root container (which includes the label when
        present), and the indicator margin sits inside that hit area.
        If a consumer scopes the hit target to the indicator alone rather
        than the Root, the indicator margin must still count toward the
        hit area so that indicator + margin meets WCAG 2.5.5/2.5.8
        (24×24 minimum) — with the current `spacingComponentBase200`
        value (8px), standalone indicator + margin = 16 + 2×8 = 32×32,
        comfortably above the minimum. Figma re-introduces a wrapper
        layer at export time when needed for auto-layout fidelity; the
        spec's canonical model is margin on the indicator.
    label-wrapper:
      horizontal-end: spacingComponentBase200
      vertical: spacingComponentBase150
      rationale: >
        End-side padding only — provides breathing room after the label.
        No start-side padding — the gap token controls indicator-to-label spacing.
        Vertical padding vertically centers the text baseline with the indicator center.
    label-inner-gap: spacingComponentBase50
    label-inner-gap-rationale: >
      Tightest tier between primary label and secondary text — they read as
      a single text cluster. Matches Label's internal gap (text ↔ required
      indicator) for consistency. Only applies when secondary text is visible.
    gap: spacingComponentBase100
    gap-rationale: Tightest atomic tier for tightly coupled elements — controls indicator-to-label spacing.

  elevation: n/a

  motion:
    status: pending
    guidance: >
      State color transitions should be fast (≤150ms) with standard ease-in-out.
      Status transitions (Unselected → Selected) may include a brief dot scale-in animation.
      Reduced motion — instant, no animation.

sizes:
  Default:
    indicator: 16px
    indicator-dot: 10px
  notes: >
    Single size — no Size variant axis. Height is always auto — emergent from
    indicator margin + indicator size when only the label is shown, and from
    primary label line-height + inner-gap + secondary text line-height +
    vertical padding when secondary text is visible. Indicator vertically aligns
    to the primary label baseline, not the full text stack center.
    Indicator and dot sizes have no token coverage and must be hardcoded.

dependencies:
  Label:
    skill: flex-components:label
    usage: >
      Sub-component for the radio's text label. Composed with
      Weight=Regular × Size=Medium × Required=Off. Label sources the
      text node, typography, and <label for> association; Radio applies
      a foreground override per Status (secondary on Unselected →
      primary on Selected) because Label does not model selection.

properties:
  component:
    Label string:
      type: TEXT
      default: 'Label'
      notes: Binds through to the text node of the composed flex-components:label sub-component.
    Secondary text string:
      type: TEXT
      default: 'Description'
      notes: Bound to the secondary text node beneath the label. Only visible when Secondary text property is true.
    Secondary text:
      type: BOOLEAN
      default: false
      notes: >
        Toggles secondary text visibility. Hidden by default — the primary
        use case remains single-label Radio.
