name: 'Beachball Release'
description: 'Creates a release PR with version bumps using Beachball'
author: 'Microsoft'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for creating PRs'
    required: true
  branch-prefix:
    description: 'Prefix for the version bump branch name'
    required: false
    default: 'beachball/version-bump'
  commit-message:
    description: 'Commit message for version bumps'
    required: false
    default: '📦 Bump package versions [skip ci]'
  pr-title:
    description: 'Title for the version bump PR'
    required: false
    default: '📦 Bump package versions'

outputs:
  has-changeset:
    description: 'Whether change files were found'
    value: ${{ steps.check-changes.outputs.has_changes }}
  published:
    description: 'Whether version bump PR was created'
    value: ${{ steps.create-pr.outputs.pr_created || steps.no-pr.outputs.pr_created || 'false' }}
  pr-number:
    description: 'The PR number if created'
    value: ${{ steps.create-pr.outputs.pr_number || steps.no-pr.outputs.pr_number }}
  pr-url:
    description: 'The PR URL if created'
    value: ${{ steps.create-pr.outputs.pr_url || steps.no-pr.outputs.pr_url }}

runs:
  using: composite
  steps:
    - name: Configure Git
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Check for change files
      id: check-changes
      shell: bash
      run: |
        # Use beachball's built-in check command
        if npx beachball check --verbose; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "✅ Change files detected"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No change files found"
        fi

    - name: Create version bump branch
      if: steps.check-changes.outputs.has_changes == 'true'
      id: create-branch
      shell: bash
      run: |
        BRANCH_NAME="${{ inputs.branch-prefix }}-$(date +%s)"
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        git switch -c "$BRANCH_NAME"
        echo "📝 Created branch: $BRANCH_NAME"

    - name: Run beachball bump
      if: steps.check-changes.outputs.has_changes == 'true'
      shell: bash
      run: |
        echo "🔄 Running beachball bump..."
        npx beachball bump --verbose

    - name: Check for version changes
      if: steps.check-changes.outputs.has_changes == 'true'
      id: check-version-changes
      shell: bash
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_version_changes=true" >> $GITHUB_OUTPUT
          echo "✅ Version changes detected"
        else
          echo "has_version_changes=false" >> $GITHUB_OUTPUT
          echo "⚠️ No version changes after bump"
        fi

    - name: Commit version bumps
      if: steps.check-changes.outputs.has_changes == 'true' && steps.check-version-changes.outputs.has_version_changes == 'true'
      shell: bash
      run: |
        git add .
        git commit -m "${{ inputs.commit-message }}"
        echo "✅ Committed version changes"

    - name: Push branch
      if: steps.check-changes.outputs.has_changes == 'true' && steps.check-version-changes.outputs.has_version_changes == 'true'
      shell: bash
      run: |
        git push origin "${{ steps.create-branch.outputs.branch_name }}"
        echo "✅ Pushed branch to origin"

    - name: Create Pull Request
      if: steps.check-changes.outputs.has_changes == 'true' && steps.check-version-changes.outputs.has_version_changes == 'true'
      id: create-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # Extract changed packages for PR body
        CHANGED_PACKAGES=$(git diff HEAD~1 --name-only | grep 'package.json' | sort | uniq || echo "See commit for details")

        PR_URL=$(gh pr create \
          --title "${{ inputs.pr-title }}" \
          --body-file - \
          --base main \
          --head "${{ steps.create-branch.outputs.branch_name }}" \
          --label "automated" \
          --label "version-bump" <<EOF
        ## Version Bump

        This PR was automatically generated by the Beachball version bump action.

        ### Changed packages:
        \`\`\`
        $CHANGED_PACKAGES
        \`\`\`

        ### What to do next:
        1. Review the version changes
        2. Merge this PR when ready
        3. The merge will trigger tag creation and NPM publishing

        **Note:** Once merged, tags will be created automatically and packages will be published to NPM.
        EOF
        )

        PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

        echo "pr_created=true" >> $GITHUB_OUTPUT
        echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

        echo "✅ Created PR: $PR_URL"

    - name: Set no-PR outputs
      if: steps.check-changes.outputs.has_changes != 'true' || steps.check-version-changes.outputs.has_version_changes != 'true'
      id: no-pr
      shell: bash
      run: |
        echo "pr_created=false" >> $GITHUB_OUTPUT
        echo "pr_number=" >> $GITHUB_OUTPUT
        echo "pr_url=" >> $GITHUB_OUTPUT
        if [ "${{ steps.check-changes.outputs.has_changes }}" != "true" ]; then
          echo "ℹ️ No action taken - no change files found"
        else
          echo "ℹ️ No action taken - no version changes after bump"
        fi
