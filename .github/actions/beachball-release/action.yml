name: 'Beachball Release'
description: 'Creates a release PR with version bumps using Beachball'
author: 'Microsoft'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for creating PRs'
    required: true
  commit-message:
    description: 'Commit message for version bumps'
    required: false
    default: '📦 Bump package versions [skip ci]'
  pr-title:
    description: 'Title for the version bump PR'
    required: false
    default: '📦 Bump package versions'
  dry-run:
    description: 'Run in dry-run mode (skip push and PR creation)'
    required: false
    default: 'no'

outputs:
  has-changes:
    description: 'Whether change files were found'
    value: ${{ steps.check-changes.outputs.has_changes }}
  published:
    description: 'Whether version bump PR was created'
    value: ${{ steps.create-pr.outputs.pr_created || 'no' }}
  pr-number:
    description: 'The PR number if created'
    value: ${{ steps.create-pr.outputs.pr_number }}
  pr-url:
    description: 'The PR URL if created'
    value: ${{ steps.create-pr.outputs.pr_url }}

runs:
  using: composite
  steps:
    - name: Configure Git
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Check for change files
      id: check-changes
      shell: bash
      run: |
        # Use beachball's built-in check command
        if npx beachball check --verbose; then
          echo "has_changes=yes" >> $GITHUB_OUTPUT
          echo "✅ Change files detected"
        else
          echo "has_changes=no" >> $GITHUB_OUTPUT
          echo "ℹ️ No change files found"
        fi

    - name: Check for existing version bump PR
      if: steps.check-changes.outputs.has_changes == 'yes'
      id: check-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # Use fixed branch name (like changesets does)
        BRANCH_NAME="beachball/version-bump/main"
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

        # Check if PR already exists from this branch
        EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' || echo "")

        if [ -n "$EXISTING_PR" ]; then
          echo "existing_pr=$EXISTING_PR" >> $GITHUB_OUTPUT
          echo "📝 Found existing PR #$EXISTING_PR, will update it"
        else
          echo "existing_pr=" >> $GITHUB_OUTPUT
          echo "📝 No existing PR found, will create new one"
        fi

    - name: Create or update version bump branch
      if: steps.check-changes.outputs.has_changes == 'yes'
      id: create-branch
      shell: bash
      run: |
        BRANCH_NAME="${{ steps.check-pr.outputs.branch_name }}"

        # Check if branch exists remotely
        if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
          echo "🔄 Branch exists, updating it"
          git fetch origin "$BRANCH_NAME"
          git switch "$BRANCH_NAME"
          git reset --hard origin/main
        else
          echo "📝 Creating new branch: $BRANCH_NAME"
          git switch -c "$BRANCH_NAME"
        fi

    - name: Run beachball bump
      if: steps.check-changes.outputs.has_changes == 'yes'
      shell: bash
      run: |
        echo "🔄 Running beachball bump..."
        npx beachball bump --verbose

    - name: Commit version bumps
      if: steps.check-changes.outputs.has_changes == 'yes'
      shell: bash
      run: |
        git add .

        # Check if there are any changes to commit
        if git diff --staged --quiet; then
          echo "⚠️ No changes after beachball bump, skipping commit"
          echo "This likely means change files were invalid or already processed"
          exit 0
        fi

        git commit -m "${{ inputs.commit-message }}"
        echo "✅ Committed version changes"

    - name: Push branch
      if: steps.check-changes.outputs.has_changes == 'yes' && inputs.dry-run == 'no'
      shell: bash
      run: |
        # Force push since we might be updating an existing branch
        git push --force-with-lease origin "${{ steps.check-pr.outputs.branch_name }}"
        echo "✅ Pushed branch to origin"

    - name: Create or Update Pull Request
      if: steps.check-changes.outputs.has_changes == 'yes' && inputs.dry-run == 'no'
      id: create-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # Create PR body
        PR_BODY=$(cat <<'EOFBODY'
        ## Version Bump

        This PR was automatically generated by the Beachball version bump action.

        ### What to do next:
        1. Review the version changes and CHANGELOG.md files
        2. Merge this PR when ready
        3. Azure Pipelines will automatically publish to NPM

        **Note:** Once merged, Azure Pipelines will detect the version changes and publish to NPM.
        EOFBODY
        )

        EXISTING_PR="${{ steps.check-pr.outputs.existing_pr }}"

        if [ -n "$EXISTING_PR" ]; then
          # Update existing PR
          echo "$PR_BODY" | gh pr edit "$EXISTING_PR" \
            --title "${{ inputs.pr-title }}" \
            --body-file -

          PR_URL=$(gh pr view "$EXISTING_PR" --json url --jq '.url')

          echo "pr_created=yes" >> $GITHUB_OUTPUT
          echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          echo "✅ Updated PR #$EXISTING_PR: $PR_URL"
        else
          # Create new PR
          PR_URL=$(echo "$PR_BODY" | gh pr create \
            --title "${{ inputs.pr-title }}" \
            --body-file - \
            --base main \
            --head "${{ steps.check-pr.outputs.branch_name }}" \
            --label "automated" \
            --label "version-bump")

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')

          echo "pr_created=yes" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          echo "✅ Created PR #$PR_NUMBER: $PR_URL"
        fi

    - name: Dry-run summary
      if: steps.check-changes.outputs.has_changes == 'yes' && inputs.dry-run == 'yes'
      shell: bash
      run: |
        echo "🔍 Dry-run mode: Skipping push and PR creation"
        echo "✅ Version bump validation successful"
        echo ""
        echo "Changes that would be committed:"
        git diff --stat HEAD
