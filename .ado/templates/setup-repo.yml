# This template install dependencies, builds, and bundles this repo
steps:
  - task: NuGetToolInstaller@0
    inputs:
      versionSpec: '5.6.0'
    displayName: 'Install Nuget'

  - task: UseNode@1
    inputs:
      version: '24'
    displayName: 'Use Node.js 24'

  - script: |
      yarn
    displayName: 'yarn install'
