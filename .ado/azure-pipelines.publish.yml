# Build pipeline for publishing

trigger:
  batch: true
  branches:
    include:
      - main
      - releases/*

pr: none

parameters:
  - name: skipNpmPublish
    displayName: Skip Npm Publish
    type: boolean
    default: false

variables:
  - group: 'FluentUI React Native Secrets'
  - group: InfoSec-SecurityResults
  - name: tags
    value: production,externalfacing

resources:
  repositories:
    - repository: OfficePipelineTemplates
      type: git
      name: 1ESPipelineTemplates/OfficePipelineTemplates
      ref: refs/tags/release

extends:
  template: v1/Office.Official.PipelineTemplate.yml@OfficePipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
      image: windows-latest
      os: windows
    sdl:
      eslint:
        configuration: 'recommended'
        parser: '@typescript-eslint/parser'
        parserOptions: 'sourceType:script\necmaVersion:2017'
        customEnvironments: true
        environmentsBrowser: true
        environmentsEs6: true
        environmentsNode: true
    stages:
      - stage: Build
        displayName: Build & Pack
        jobs:
          - job: BuildAndPack
            displayName: Build, Test & Pack
            pool:
              name: Azure-Pipelines-1ESPT-ExDShared
              image: ubuntu-latest
              os: linux
            templateContext:
              outputs:
                - output: pipelineArtifact
                  targetPath: $(System.DefaultWorkingDirectory)/_packed
                  artifactName: packed-tarballs
            steps:
              - task: UseNode@1
                inputs:
                  version: '22.x'
                displayName: 'Use Node.js 22.x'

              - script: |
                  curl -s https://repo.yarnpkg.com/install | bash
                  echo "##vso[task.prependpath]$(HOME)/.yarn/switch/bin"
                displayName: 'Install Yarn Switch'

              - script: |
                  yarn
                displayName: 'yarn install'

              - script: |
                  yarn buildci
                displayName: 'yarn buildci [build + test + lint]'

              - script: |
                  yarn tasks run pack
                displayName: 'Pack all public packages'

              - script: |
                  ls -la $(System.DefaultWorkingDirectory)/_packed/
                  if ls $(System.DefaultWorkingDirectory)/_packed/*.tgz > /dev/null 2>&1; then
                    echo "##vso[task.setvariable variable=hasTarballs;isOutput=true]true"
                  else
                    echo "##vso[task.setvariable variable=hasTarballs;isOutput=true]false"
                  fi
                name: check
                displayName: 'List packed tarballs'

      - stage: Publish
        displayName: Publish to NPM
        dependsOn: Build
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), not(${{ parameters.skipNpmPublish }}), eq(stageDependencies.Build.BuildAndPack.outputs['check.hasTarballs'], 'true'))
        jobs:
          - job: PublishPackages
            displayName: Publish NPM Packages
            pool:
              name: Azure-Pipelines-1ESPT-ExDShared
              image: ubuntu-latest
              os: linux
            steps:
              - task: UseNode@1
                inputs:
                  version: '22.x'
                displayName: 'Use Node.js 22.x'

              - script: |
                  curl -s https://repo.yarnpkg.com/install | bash
                  echo "##vso[task.prependpath]$(HOME)/.yarn/switch/bin"
                displayName: 'Install Yarn Switch'

              - task: DownloadPipelineArtifact@2
                inputs:
                  artifactName: packed-tarballs
                  targetPath: $(System.DefaultWorkingDirectory)/_packed
                displayName: 'Download packed tarballs'

              - script: |
                  echo "Downloaded tarballs:"
                  ls -la $(System.DefaultWorkingDirectory)/_packed/
                displayName: 'List downloaded tarballs'

              - script: |
                  yarn
                displayName: 'yarn install'

              - script: |
                  yarn config set npmPublishAccess public
                  yarn config set npmPublishRegistry "https://registry.npmjs.org"
                  yarn config set npmAuthToken $(npmAuth)
                  npm config set //registry.npmjs.org/:_authToken $(npmAuth)
                displayName: 'Configure npm publishing auth'

              - script: |
                  # https://github.com/changesets/changesets/issues/432
                  # We can't use `changeset publish` because it doesn't support workspaces, so we have to publish each package individually
                  yarn tasks run publish
                displayName: 'Publish NPM Packages'

              - script: |
                  yarn config unset npmPublishAccess
                  yarn config unset npmAuthToken
                  yarn config unset npmPublishRegistry
                  npm config delete //registry.npmjs.org/:_authToken
                displayName: 'Cleanup npm publishing auth'
                condition: always()

              - script: |
                  git clean -dfx
                displayName: 'Clean up working directory'
                condition: always()
